<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="USCA Connect">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='36' fill='%234F46E5'/%3E%3Ccircle cx='96' cy='96' r='18' fill='%2310B981'/%3E%3Cpath d='M96 30v16M96 146v16M30 96h16M146 96h16' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
<title>USCA Connect — Pitié-Salpêtrière</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; }
</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

  <!-- En-tête -->
  <header class="pt-safe-top bg-indigo-600 text-white px-6 pt-12 pb-8 text-center">
    <!-- Logo -->
    <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-2xl mb-4 backdrop-blur">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/>
      </svg>
    </div>
    <h1 class="text-2xl font-extrabold tracking-tight">USCA Connect</h1>
    <p class="text-indigo-200 text-sm mt-1">Pitié-Salpêtrière &middot; Addictologie</p>
  </header>

  <!-- Contenu principal -->
  <main class="flex-1 flex flex-col items-center justify-center px-6 py-10 gap-5 max-w-md mx-auto w-full">

    <p class="text-slate-500 text-sm font-medium text-center mb-2">Sélectionnez votre profil pour continuer</p>

    <!-- Carte Soignant -->
    <a href="staff/" class="w-full bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-300 transition-all p-6 flex items-center gap-5 group active:scale-[0.98]">
      <div class="flex-shrink-0 w-14 h-14 bg-indigo-50 rounded-xl flex items-center justify-center group-hover:bg-indigo-100 transition-colors">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/>
          <path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/>
        </svg>
      </div>
      <div class="flex-1">
        <h2 class="text-lg font-bold text-slate-800">Je suis soignant</h2>
        <p class="text-sm text-slate-500 mt-0.5">Toolbox, dashboard, alertes, groupes</p>
      </div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0"><path d="m9 18 6-6-6-6"/></svg>
    </a>

    <!-- Carte Patient -->
    <a href="patient/" class="w-full bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-emerald-300 transition-all p-6 flex items-center gap-5 group active:scale-[0.98]">
      <div class="flex-shrink-0 w-14 h-14 bg-emerald-50 rounded-xl flex items-center justify-center group-hover:bg-emerald-100 transition-colors">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M19 8v6"/><path d="M22 11h-6"/>
        </svg>
      </div>
      <div class="flex-1">
        <h2 class="text-lg font-bold text-slate-800">Je suis patient</h2>
        <p class="text-sm text-slate-500 mt-0.5">Programme du jour, alertes, fiches</p>
      </div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0"><path d="m9 18 6-6-6-6"/></svg>
    </a>

  </main>

  <!-- Pied de page -->
  <footer class="text-center py-6 px-6">
    <p class="text-xs text-slate-400">USCA &middot; ELSA &middot; AP-HP Pitié-Salpêtrière</p>
    <p class="text-xs text-slate-300 mt-1">v2.0</p>
  </footer>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
