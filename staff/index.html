<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="../manifest.json">
<title>USCA Connect — Espace Soignant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; margin: 0; padding: 0; background: #f8fafc; overflow: hidden; }
  .top-bar { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .back-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; background: #4F46E5; border: none; cursor: pointer; transition: background 0.15s; }
  .back-btn:hover { background: #4338CA; }
  .toolbox-frame { width: 100%; border: none; height: calc(100vh - 52px); height: calc(100dvh - 52px); display: block; }
</style>
</head>
<body>

  <!-- Top bar minimaliste -->
  <header class="top-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="../" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <span style="font-size:14px;font-weight:800;color:#1e293b;">USCA Connect</span>
      <span style="font-size:11px;font-weight:600;color:#4F46E5;background:#EEF2FF;padding:2px 8px;border-radius:999px;">Soignant</span>
    </div>
    <span style="font-size:11px;color:#94a3b8;">Pitié-Salpêtrière</span>
  </header>

  <!-- Toolbox V1 plein écran -->
  <iframe class="toolbox-frame" src="toolbox.html?embedded=true" title="USCA Toolbox"></iframe>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../sw.js', {scope: '/'}).catch(()=>{});
}
</script>
</body>
</html>
