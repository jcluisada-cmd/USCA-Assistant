<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="../manifest.json">
<title>USCA Connect — Espace Soignant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/theme.css">
<style>
  body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; margin: 0; padding: 0; background: #f8fafc; overflow: hidden; }
  .top-bar { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .back-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; background: #4F46E5; border: none; cursor: pointer; transition: background 0.15s; }
  .back-btn:hover { background: #4338CA; }
  .theme-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; background: #f1f5f9; border: none; cursor: pointer; transition: background 0.15s; }
  .toolbox-frame { width: 100%; border: none; height: calc(100vh - 52px); height: calc(100dvh - 52px); display: block; }
  html.dark body { background: #0f172a; }
  html.dark .top-bar { background: rgba(15,23,42,0.95); border-color: #334155; }
  html.dark .theme-btn { background: #334155; }
</style>
</head>
<body>

  <!-- Top bar minimaliste -->
  <header class="top-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="../" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <span style="font-size:14px;font-weight:800;color:#1e293b;" class="text-slate-800">USCA Connect</span>
      <span style="font-size:11px;font-weight:600;color:#4F46E5;background:#EEF2FF;padding:2px 8px;border-radius:999px;">Soignant</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="btn-theme" class="theme-btn" title="Thème">
        <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
      <span style="font-size:11px;color:#94a3b8;" class="text-slate-400">Pitié-Salpêtrière</span>
    </div>
  </header>

  <!-- Toolbox V1 plein écran -->
  <iframe class="toolbox-frame" src="toolbox.html?embedded=true" title="USCA Toolbox"></iframe>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../sw.js', {scope: '/'}).catch(()=>{});
}
</script>
<script src="../shared/theme.js"></script>
</body>
</html>
