<script>
'use strict';

// ── Nettoyage préfixe question "[Item XX] Question N - Difficulté : " ──
function cleanQ(text) {
  return String(text || '').replace(/^\[.*?\].*?:\s*/, '');
}

// ── Helper DOM safe (remplace innerHTML sur tout contenu dynamique) ──
function el(tag, attrs, children) {
  var n = document.createElement(tag);
  if (attrs) {
    for (var k in attrs) {
      if (k === 'class') n.className = attrs[k];
      else if (k === 'text') n.textContent = attrs[k];
      else if (k === 'dataset') { for (var dk in attrs[k]) n.dataset[dk] = attrs[k][dk]; }
      else if (k === 'html') n.innerHTML = attrs[k]; // réservé aux SVG littéraux sans data externe
      else n.setAttribute(k, attrs[k]);
    }
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(function(c) {
      if (c == null) return;
      n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
  }
  return n;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

// ── Garde session ──
var _previewTuteur = new URLSearchParams(location.search).get('preview') === 'tuteur';

(async function guard() {
  var session = await auth.getStaffSession();
  if (!session) { window.location.href = '../'; return; }

  if (_previewTuteur) {
    // Mode tuteur : soignant (médecin/admin) navigue en mode preview
    var allowedRoles = ['medecin', 'ide', 'pharmacien', 'psychologue', 'secretaire'];
    if (!session.is_admin && allowedRoles.indexOf(session.role) === -1) {
      window.location.href = '../'; return;
    }
    document.getElementById('hdr-nom').textContent = 'QCM EDN — Vue tuteur';
    document.getElementById('hdr-tuteur').textContent = session.nom || '';
    // Masquer les sections non pertinentes (chambres, signalements, export)
    var toHide = ['btn-logout'];
    // Ajouter un bandeau tuteur
    var banner = document.createElement('div');
    banner.style.cssText = 'background:#FEF3C7;color:#92400E;text-align:center;padding:8px 16px;font-size:0.75rem;font-weight:700;border-bottom:1px solid #FDE68A';
    banner.textContent = '🩺 Mode tuteur — ';
    var lnk = document.createElement('a');
    lnk.href = '../admin/';
    lnk.style.cssText = 'text-decoration:underline;font-weight:800';
    lnk.textContent = '← Retour au dashboard';
    banner.appendChild(lnk);
    document.querySelector('header').after(banner);
    // Masquer les sections non pertinentes pour le tuteur
    ['section-entrees-sorties', 'section-small-cards', 'section-checklist', 'section-questions'].forEach(function(sid) {
      var s = document.getElementById(sid);
      if (s) s.style.display = 'none';
    });
  } else {
    // Mode normal : seul role='externe' autorisé
    if (session.role !== 'externe') { window.location.href = '../admin/'; return; }
    document.getElementById('hdr-nom').textContent = session.nom || 'Externe';
  }
  initApp();
})();

document.getElementById('btn-logout').addEventListener('click', async function() {
  await auth.logoutStaff();
  window.location.href = '../';
});

// ── Accordions ──
document.querySelectorAll('.accordion-toggle').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var body = document.getElementById(btn.dataset.target);
    var icon = btn.querySelector('.accordion-icon');
    var open = !body.classList.contains('hidden');
    body.classList.toggle('hidden');
    if (icon) icon.style.transform = open ? '' : 'rotate(180deg)';
  });
});

// Mode fixé : entraînement avec correction immédiate
var currentMode = 'entrainement';

// ── Init ──
async function initApp() {
  try {
    var index = await QCMEngine.loadIndex();
    var sel = document.getElementById('qcm-item');
    index.items.forEach(function(it) {
      var opt = document.createElement('option');
      opt.value = it.item;
      opt.textContent = it.item + ' · ' + it.domaine + ' (' + it.nb_questions + ')';
      sel.appendChild(opt);
    });
    document.getElementById('qcm-stats').textContent = index.total_questions + ' questions · ' + index.total_items + ' items';
    // En mode tuteur : afficher le bouton "Voir toutes les questions"
    if (_previewTuteur) {
      document.getElementById('qcm-view-all').classList.remove('hidden');
    }
  } catch(e) {
    document.getElementById('qcm-stats').textContent = 'Erreur catalogue';
  }
  if (!_previewTuteur) { loadFlags(); loadInProgress(); loadChecklist(); loadQuestions(); }
}

async function loadInProgress() {
  var box = document.getElementById('qcm-inprogress');
  if (!box) return;
  clear(box);
  try {
    var sessions = await QCMEngine.getMyInProgressSessions();
    if (!sessions.length) { box.classList.add('hidden'); return; }
    box.classList.remove('hidden');
    sessions.forEach(function(s) {
      var nb = (s.qcm_reponses && s.qcm_reponses[0]) ? Number(s.qcm_reponses[0].count) : 0;
      var pct = s.nb_questions ? Math.round(100 * nb / s.nb_questions) : 0;
      var row = el('div', { class: 'bg-indigo-50 border border-indigo-100 rounded-xl px-3 py-2.5' });
      var top = el('div', { class: 'flex items-center justify-between gap-2 mb-1.5' });
      top.appendChild(el('p', { class: 'text-xs font-bold text-indigo-800 truncate', text: '📖 ' + (s.item || 'Tous les items') + ' — ' + nb + '/' + s.nb_questions + ' (' + pct + '%)' }));
      var btnReprendre = el('button', { class: 'text-[11px] font-bold px-2.5 py-1 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 flex-shrink-0', text: 'Reprendre' });
      (function(session) {
        btnReprendre.addEventListener('click', function() { resumeSession(session); });
      })(s);
      top.appendChild(btnReprendre);
      row.appendChild(top);
      var bar = el('div', { class: 'h-1 bg-indigo-100 rounded-full overflow-hidden' });
      var fill = el('div', { class: 'h-full bg-indigo-500 rounded-full' });
      fill.style.width = pct + '%';
      bar.appendChild(fill);
      row.appendChild(bar);
      box.appendChild(row);
    });
  } catch(e) {
    box.classList.add('hidden');
  }
}

var _exPatients = [];
var _exAttente = [];
var _exEditingAttenteId = null;
var _exAdmettreItem = null;

function switchExESTab(tab) {
  var isSorties = tab === 'sorties';
  document.getElementById('ex-tab-sorties').classList.toggle('hidden', !isSorties);
  document.getElementById('ex-tab-attente').classList.toggle('hidden', isSorties);
  document.getElementById('ex-tab-sorties-btn').className = 'flex-1 text-xs font-bold py-2.5 text-center ' + (isSorties ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400 border-b-2 border-transparent');
  document.getElementById('ex-tab-attente-btn').className = 'flex-1 text-xs font-bold py-2.5 text-center ' + (!isSorties ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400 border-b-2 border-transparent');

async function loadExEntreesSorties() {
  try {
    _exPatients = await db.getPatients() || [];
  } catch(e) { _exPatients = []; }
  renderExSorties();
  try {
    _exAttente = await db.getListeAttente() || [];
  } catch(e) { _exAttente = []; }
  renderExAttente();
}

function renderExSorties() {
  var list = document.getElementById('ex-sorties-list');
  if (!list) return;
  clear(list);
  var sorties = _exPatients.filter(function(p) { return p.date_sortie_prevue; })
    .sort(function(a, b) { return new Date(a.date_sortie_prevue) - new Date(b.date_sortie_prevue); });
  if (!sorties.length) {
    list.appendChild(el('p', { class: 'text-xs text-slate-400 text-center py-3', text: 'Aucune sortie prévue.' }));
    return;
  }
  var destLabels = { rad: 'RAD', postcure: 'Post-cure', autre: 'Autre' };
  sorties.forEach(function(p) {
    var today = new Date(); today.setHours(0,0,0,0);
    var sd = new Date(p.date_sortie_prevue); sd.setHours(0,0,0,0);
    var isPast = sd <= today;
    var dateStr = new Date(p.date_sortie_prevue).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    var info = p.sortie_info || {};
    var dest = info.destination ? (destLabels[info.destination] || info.destination) : null;
    var subst = p.substance_principale || null;
    var row = el('div', { class: 'flex items-center gap-2 bg-slate-50 rounded-lg p-2.5' });
    var left = el('div', { class: 'flex items-center gap-2 flex-1 min-w-0' });
    left.appendChild(el('span', { class: 'text-xs font-bold px-2 py-1 rounded bg-indigo-100 text-indigo-700 flex-shrink-0', text: 'Ch.' + p.numero_chambre }));
    left.appendChild(el('span', { class: 'text-xs text-slate-700 truncate', text: p.prenom || '—' }));
    if (subst) left.appendChild(el('span', { class: 'text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 flex-shrink-0 hidden sm:inline', text: subst }));
    if (dest) left.appendChild(el('span', { class: 'text-[10px] px-1.5 py-0.5 rounded bg-slate-200 text-slate-600 flex-shrink-0', text: dest }));
    row.appendChild(left);
    row.appendChild(el('span', { class: 'text-xs font-semibold flex-shrink-0 ' + (isPast ? 'text-red-500' : 'text-emerald-600'), text: dateStr }));
    list.appendChild(row);
  });
}

function renderExAttente() {
  var list = document.getElementById('ex-attente-list');
  if (!list) return;
  clear(list);
  if (!_exAttente.length) {
    list.appendChild(el('p', { class: 'text-xs text-slate-400 text-center py-3', text: 'Aucun patient en attente.' }));
    return;
  }
  _exAttente.forEach(function(p) {
    var dateStr = p.date_entree_prevue ? new Date(p.date_entree_prevue).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }) : '—';
    var row = el('div', { class: 'flex items-center justify-between gap-2 bg-slate-50 rounded-lg p-2.5 mb-1' });
    var left = el('div', { class: 'flex-1 min-w-0' });
    var top = el('div', { class: 'flex items-center gap-1.5 flex-wrap' });
    top.appendChild(el('span', { class: 'text-xs font-bold text-slate-700', text: p.age ? p.age + ' ans' : '—' }));
    top.appendChild(el('span', { class: 'text-[10px] px-1.5 py-0.5 rounded bg-indigo-100 text-indigo-700', text: p.addressage || '—' }));
    top.appendChild(el('span', { class: 'text-[10px] text-slate-400', text: dateStr }));
    left.appendChild(top);
    if (p.commentaire) left.appendChild(el('p', { class: 'text-[10px] text-slate-500 truncate mt-0.5', text: p.commentaire }));
    row.appendChild(left);
    var actions = el('div', { class: 'flex items-center gap-1 flex-shrink-0' });
    var btnAdm = el('button', { class: 'text-[10px] font-bold px-2 py-1 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700', text: 'Adm.' });
    (function(pat) {
      btnAdm.addEventListener('click', function() {
        _exAdmettreItem = pat;
        document.getElementById('ex-adm-chambre').value = '';
        document.getElementById('ex-adm-ddn').value = '';
        document.getElementById('ex-adm-error').classList.add('hidden');
        document.getElementById('ex-form-attente').classList.add('hidden');
        document.getElementById('ex-form-admettre').classList.remove('hidden');
        document.getElementById('ex-btn-add-attente').classList.add('hidden');
      });
    })(p);
    actions.appendChild(btnAdm);
    var btnEd = el('button', { class: 'text-[10px] font-bold px-1.5 py-1 bg-white border border-slate-200 rounded-lg text-slate-500 hover:bg-slate-100', text: '✏️' });
    (function(pat) {
      btnEd.addEventListener('click', function() {
        _exEditingAttenteId = pat.id;
        document.getElementById('ex-form-attente-title').textContent = 'Modifier';
        document.getElementById('ex-att-age').value = pat.age || '';
        document.getElementById('ex-att-date').value = pat.date_entree_prevue || '';
        document.getElementById('ex-att-commentaire').value = pat.commentaire || '';
        var sel = document.getElementById('ex-att-addressage');
        for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === pat.addressage) { sel.selectedIndex = i; break; } }
        document.getElementById('ex-form-admettre').classList.add('hidden');
        document.getElementById('ex-form-attente').classList.remove('hidden');
        document.getElementById('ex-btn-add-attente').classList.add('hidden');
      });
    })(p);
    actions.appendChild(btnEd);
    var btnDel = el('button', { class: 'text-[10px] font-bold px-1.5 py-1 bg-white border border-red-200 rounded-lg text-red-400 hover:bg-red-50', text: '✕' });
    (function(id) {
      btnDel.addEventListener('click', async function() {
        if (!confirm('Retirer ce patient de la liste d\'attente ?')) return;
        try { await db.deleteListeAttente(id); await loadExEntreesSorties(); } catch(e) { alert('Erreur : ' + e.message); }
      });
    })(p.id);
    actions.appendChild(btnDel);
    row.appendChild(actions);
    list.appendChild(row);
  });
}

document.getElementById('ex-btn-cancel-admettre').addEventListener('click', function() {
  document.getElementById('ex-form-admettre').classList.add('hidden');
  document.getElementById('ex-btn-add-attente').classList.remove('hidden');
  _exAdmettreItem = null;
});

document.getElementById('ex-btn-save-attente').addEventListener('click', async function() {
  var age = parseInt(document.getElementById('ex-att-age').value);

document.getElementById('ex-btn-save-admettre').addEventListener('click', async function() {
  if (!_exAdmettreItem) return;
  var chambre = document.getElementById('ex-adm-chambre').value.trim();

    document.getElementById('ex-form-admettre').classList.add('hidden');
    document.getElementById('ex-btn-add-attente').classList.remove('hidden');

    await loadExEntreesSorties();
  } catch(e) { errEl.textContent = 'Erreur : ' + e.message; errEl.classList.remove('hidden'); }
  this.disabled = false; this.textContent = 'Admettre';
});

// ════════════════ CHECKLIST ════════════════
var _checklistItems = [];
var _checklistSaveTimer = null;

async function loadChecklist() {
  try { _checklistItems = await db.getChecklist() || []; } catch(e) { _checklistItems = []; }
  renderChecklist();
}

function renderChecklist() {
  var box = document.getElementById('checklist-items');
  var summary = document.getElementById('checklist-summary');
  if (!box) return;
  clear(box);
  var total = _checklistItems.length;
  var done = _checklistItems.filter(function(i) { return i.done; }).length;
  summary.textContent = total ? done + '/' + total + ' terminé' + (total > 1 ? 's' : '') : 'Aucun élément';
  if (!total) {
    box.appendChild(el('p', { class: 'text-sm text-slate-400 text-center px-5 py-4', text: 'Ajoutez des tâches à faire…' }));
    return;
  }
  _checklistItems.forEach(function(item, idx) {
    var row = el('div', { class: 'flex items-center gap-3 px-5 py-3' });
    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = !!item.done;
    cb.className = 'w-4 h-4 accent-cyan-600 flex-shrink-0 cursor-pointer';
    (function(i) {
      cb.addEventListener('change', function() {
        _checklistItems[i].done = cb.checked;
        renderChecklist();
        scheduleChecklistSave();
      });
    })(idx);
    var label = el('span', { class: 'flex-1 text-sm ' + (item.done ? 'line-through text-slate-400' : 'text-slate-800'), text: item.text });
    var btnDel = el('button', { class: 'text-slate-300 hover:text-red-400 transition-colors text-xs flex-shrink-0', text: '✕' });
    (function(i) {
      btnDel.addEventListener('click', function() {
        _checklistItems.splice(i, 1);
        renderChecklist();
        scheduleChecklistSave();
      });
    })(idx);
    row.appendChild(cb); row.appendChild(label); row.appendChild(btnDel);
    box.appendChild(row);
  });
}

function scheduleChecklistSave() {
  if (_checklistSaveTimer) clearTimeout(_checklistSaveTimer);
  _checklistSaveTimer = setTimeout(async function() {
    try { await db.saveChecklist(_checklistItems); } catch(e) { console.warn('checklist save:', e); }
  }, 600);
}

document.getElementById('checklist-add').addEventListener('click', function() {
  var inp = document.getElementById('checklist-input');
  var text = inp.value.trim();
  if (!text) return;
  _checklistItems.push({ id: Date.now().toString(36), text: text, done: false });
  inp.value = '';
  renderChecklist();
  scheduleChecklistSave();
});

document.getElementById('checklist-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('checklist-add').click(); }
});

// ════════════════ QUESTIONS AU TUTEUR ════════════════
var _myQuestions = [];
var _editingQId = null;

async function loadQuestions() {
  var countEl = document.getElementById('questions-count');
  try {
    _myQuestions = await db.getMyExternQuestions();
    var nbOuv = _myQuestions.filter(function(q) { return q.statut === 'ouvert'; }).length;
    countEl.textContent = _myQuestions.length
      ? _myQuestions.length + ' message' + (_myQuestions.length > 1 ? 's' : '') + (nbOuv ? ' · ' + nbOuv + ' en attente' : ' · tout traité')
      : 'Aucune question envoyée';
  } catch(e) { countEl.textContent = 'Erreur de chargement'; _myQuestions = []; }
  renderQuestions();
}

function renderQuestions() {
  var box = document.getElementById('questions-list');
  if (!box) return;
  clear(box);
  if (!_myQuestions.length) {
    box.appendChild(el('p', { class: 'text-sm text-slate-400 text-center px-5 py-4', text: 'Aucune question envoyée.' }));
    return;
  }
  _myQuestions.forEach(function(q) {
    var isTraite = q.statut === 'traite';
    var wrap = el('div', { class: 'px-5 py-3' });

    if (_editingQId === q.id) {
      var editArea = document.createElement('textarea');
      editArea.rows = 2;
      editArea.className = 'w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm resize-none focus:outline-none focus:border-violet-400 mb-2';
      editArea.value = q.message;
      var saveBtn = el('button', { class: 'text-xs font-bold px-3 py-1.5 bg-violet-600 text-white rounded-lg hover:bg-violet-700 mr-2', text: 'Enregistrer' });
      var cancelBtn = el('button', { class: 'text-xs font-bold px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-slate-600', text: 'Annuler' });
      saveBtn.addEventListener('click', async function() {
        var msg = editArea.value.trim(); if (!msg) return;
        try { await db.updateExternQuestion(q.id, { message: msg }); _editingQId = null; await loadQuestions(); } catch(e) { alert('Erreur : ' + e.message); }
      });
      cancelBtn.addEventListener('click', function() { _editingQId = null; renderQuestions(); });
      wrap.appendChild(editArea); wrap.appendChild(saveBtn); wrap.appendChild(cancelBtn);
      box.appendChild(wrap); return;
    }

    var header = el('div', { class: 'flex items-start justify-between gap-2 mb-1.5' });
    var left = el('div', { class: 'flex-1 min-w-0' });
    left.appendChild(el('p', { class: 'text-sm text-slate-800 leading-relaxed', text: q.message }));
    left.appendChild(el('p', { class: 'text-[10px] text-slate-400 mt-0.5', text: new Date(q.created_at).toLocaleDateString('fr-FR') }));
    header.appendChild(left);
    header.appendChild(el('span', {
      class: 'text-[10px] font-bold px-2 py-0.5 rounded-full flex-shrink-0 ' + (isTraite ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'),
      text: isTraite ? '✓ Répondu' : 'En attente'
    }));
    wrap.appendChild(header);

    if (q.reponse) {
      var rep = el('div', { class: 'mt-1.5 px-3 py-2 bg-violet-50 rounded-lg border border-violet-100' });
      rep.appendChild(el('p', { class: 'text-[10px] font-bold text-violet-500 mb-0.5', text: '💬 Réponse du tuteur' }));
      rep.appendChild(el('p', { class: 'text-xs text-violet-900 leading-relaxed', text: q.reponse }));
      wrap.appendChild(rep);
    }

    var actRow = el('div', { class: 'flex gap-2 mt-2' });
    if (!isTraite) {
      var editBtn = el('button', { class: 'text-[11px] font-bold px-2.5 py-1 bg-white border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50', text: '✏️ Modifier' });
      (function(qId) { editBtn.addEventListener('click', function() { _editingQId = qId; renderQuestions(); }); })(q.id);
      actRow.appendChild(editBtn);
    }
    var delBtn = el('button', { class: 'text-[11px] font-bold px-2.5 py-1 bg-white border border-red-100 rounded-lg text-red-400 hover:bg-red-50', text: '✕ Supprimer' });
    (function(qId) {
      delBtn.addEventListener('click', async function() {
        if (!confirm('Supprimer cette question ?')) return;
        try { await db.deleteExternQuestion(qId); await loadQuestions(); } catch(e) { alert('Erreur : ' + e.message); }
      });
    })(q.id);
    actRow.appendChild(delBtn);
    wrap.appendChild(actRow);
    box.appendChild(wrap);
  });
}

document.getElementById('question-submit').addEventListener('click', async function() {
  var inp = document.getElementById('question-input');
  var msg = inp.value.trim();
  if (!msg) return;
  this.disabled = true; this.textContent = 'Envoi…';
  try {
    await db.createExternQuestion(msg);
    inp.value = '';
    await loadQuestions();
  } catch(e) { alert('Erreur : ' + e.message); }
  this.disabled = false; this.textContent = 'Envoyer la question';
});

async function loadFlags() {
  var box = document.getElementById('flags-list');
  var counter = document.getElementById('flags-count');
  try {
    var flags = await QCMEngine.getMyFlags();
    if (!flags.length) {
      counter.textContent = 'Aucun signalement';
      return;
    }
    var nbOuv = flags.filter(function(f){ return f.statut === 'ouvert'; }).length;
    counter.textContent = flags.length + ' signalement' + (flags.length>1?'s':'') + ' · ' + nbOuv + ' en attente';
    clear(box);
    flags.forEach(function(f) {
      var d = new Date(f.created_at).toLocaleDateString('fr-FR');
      var statutClass = f.statut === 'traite' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700';
      var typeLabel = f.type === 'erreur_question' ? 'Erreur' : 'Explication';
      var inner = el('div', { class: 'flex-1 min-w-0' }, [
        el('p', { class: 'text-xs font-bold text-slate-800', text: f.question_source }),
        el('p', { class: 'text-[11px] text-slate-500 mt-0.5', text: typeLabel + ' · ' + d })
      ]);
      if (f.message) inner.appendChild(el('p', { class: 'text-xs text-slate-600 mt-1 italic', text: '« ' + f.message + ' »' }));
      if (f.tuteur_reponse) inner.appendChild(el('p', { class: 'text-xs text-emerald-700 mt-2 bg-emerald-50 p-2 rounded', text: 'Tuteur : ' + f.tuteur_reponse }));
      var row = el('div', { class: 'px-5 py-3' }, [
        el('div', { class: 'flex items-start justify-between gap-2' }, [
          inner,
          el('span', { class: 'text-[10px] font-bold px-2 py-0.5 rounded-full ' + statutClass, text: f.statut === 'traite' ? 'Traité' : 'Ouvert' })
        ])
      ]);
      box.appendChild(row);
    });
  } catch(e) {
    counter.textContent = 'Erreur de chargement';
  }
}

// ════════════════ JOUEUR QCM ════════════════
var qcmState = null;

// ── Vue tuteur : toutes les questions d'un item ──
document.getElementById('qcm-view-all').addEventListener('click', async function() {
  var btn = this;
  var item = document.getElementById('qcm-item').value;
  if (!item) { alert('Sélectionnez un item.'); return; }
  btn.disabled = true; btn.textContent = 'Chargement…';
  try {
    var questions = await QCMEngine.loadItem(item);
    showAllQuestionsModal(item, questions);
  } catch(e) { alert('Erreur : ' + e.message); }
  btn.disabled = false; btn.textContent = '📋 Voir toutes les questions';
});

function showAllQuestionsModal(itemLabel, questions) {
  var modal = document.getElementById('qcm-modal');
  document.getElementById('qcm-progress').textContent = itemLabel;
  document.getElementById('qcm-meta').textContent = questions.length + ' questions — mode lecture tuteur';
  var content = document.getElementById('qcm-content');
  clear(content);

  questions.forEach(function(q, idx) {
    var qBlock = el('div', { class: 'pb-5 mb-5 border-b border-slate-100 last:border-0 last:mb-0' });
    qBlock.appendChild(el('p', { class: 'text-[10px] font-bold text-indigo-400 mb-1', text: 'Q' + (idx + 1) + ' · Difficulté ' + q.difficulte }));
    qBlock.appendChild(el('p', { class: 'text-sm font-semibold text-slate-800 mb-3 leading-relaxed', text: cleanQ(q.question) }));
    q.reponses.forEach(function(r) {
      var isCorrect = r.correct === true;
      var row = el('div', {
        class: 'flex items-start gap-2 py-1.5 px-2 rounded-lg mb-1 ' + (isCorrect ? 'bg-emerald-50' : '')
      });
      var letter = el('span', {
        class: 'w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold flex-shrink-0 ' +
          (isCorrect ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-500')
      });
      letter.textContent = r.lettre;
      var txt = el('span', { class: 'text-sm ' + (isCorrect ? 'text-emerald-800 font-semibold' : 'text-slate-600') });
      txt.textContent = r.texte;
      row.appendChild(letter); row.appendChild(txt);
      qBlock.appendChild(row);
    });
    if (q.explication) {
      var exp = el('div', { class: 'mt-2 px-3 py-2 bg-indigo-50 rounded-lg border border-indigo-100' });
      exp.appendChild(el('p', { class: 'text-[11px] font-bold text-indigo-500 mb-0.5', text: '💡 Explication' }));
      exp.appendChild(el('p', { class: 'text-xs text-indigo-800 leading-relaxed', text: q.explication }));
      qBlock.appendChild(exp);
    }
    // Bouton 👎 par question (mode tuteur — signaler une erreur)
    var flagRow = el('div', { class: 'mt-2 flex justify-end' });
    var btnFlag = el('button', { class: 'text-xs text-slate-300 hover:text-red-500 transition-colors', text: '👎 Signaler une erreur' });
    (function(qItem, qNum) {
      btnFlag.addEventListener('click', async function() {
        if (!confirm('Signaler une erreur dans cette question ?')) return;
        try {
          await QCMEngine.flagQuestion(QCMEngine._utils.questionSourceId(qItem, qNum), 'erreur_question', null);
          btnFlag.textContent = '✓ Signalé';
          btnFlag.disabled = true;
        } catch(e) { alert('Erreur : ' + e.message); }
      });
    })(q.item, q.question_numero);
    flagRow.appendChild(btnFlag);
    qBlock.appendChild(flagRow);
    content.appendChild(qBlock);
  });

  // Masquer explication + suivant (non pertinents en mode lecture)
  document.getElementById('qcm-flag').style.display = 'none';
  document.getElementById('qcm-next').style.display = 'none';
  // Garder 👎 visible pour signaler des erreurs depuis la vue tuteur
  document.getElementById('qcm-thumbdown').style.display = '';
  modal.classList.remove('hidden');
}

document.getElementById('qcm-start').addEventListener('click', async function() {
  var btn = this;
  btn.disabled = true; btn.textContent = 'Chargement…';
  try {
    var item = document.getElementById('qcm-item').value || null;
    // Vérifier s'il existe une session en cours pour cet item
    var inProgress = await QCMEngine.getMyInProgressSessions();
    var existing = inProgress.find(function(s) { return s.item === item || (!s.item && !item); });
    if (existing) {
      var nb = (existing.qcm_reponses && existing.qcm_reponses[0]) ? Number(existing.qcm_reponses[0].count) : 0;
      var choice = confirm('Session en cours : ' + nb + '/' + existing.nb_questions + ' questions répondues.\n\nOK → Reprendre\nAnnuler → Recommencer depuis le début');
      if (choice) {
        btn.disabled = false; btn.textContent = 'Lancer la session';
        resumeSession(existing);
        return;
      }
      await QCMEngine.abandonSession(existing.id);
    }
    var questions = await QCMEngine.getQuestions({ item: item, mode: 'sequential' });
    if (!questions.length) { alert('Aucune question pour cet item.'); return; }
    await startFreshSession(item, questions);
  } catch(e) {
    alert('Erreur : ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Lancer la session';
  }
});

async function startFreshSession(item, questions) {
  var session = await QCMEngine.startSession({ item: item, mode: currentMode, questions: questions });
  qcmState = { sessionId: session.id, item: item, mode: currentMode, questions: questions, idx: 0, reponses: [], tStart: Date.now() };
  document.getElementById('qcm-flag').style.display = '';
  document.getElementById('qcm-thumbdown').style.display = '';
  document.getElementById('qcm-next').style.display = '';
  showQuestion();
  document.getElementById('qcm-modal').classList.remove('hidden');
}

async function resumeSession(session) {
  try {
    var item = session.item || null;
    var questions = await QCMEngine.getQuestions({ item: item, mode: 'sequential' });
    // Construire un index source → question
    var srcMap = {};
    questions.forEach(function(q) { srcMap[q._source] = q; });
    // Reconstruire la liste ordonnée à partir de questions_json
    var sessionQuestions = (session.questions_json || []).map(function(src) { return srcMap[src]; }).filter(Boolean);
    if (!sessionQuestions.length) { await startFreshSession(item, questions); return; }
    // Récupérer les réponses déjà enregistrées
    var existingReponses = await QCMEngine.getSessionReponses(session.id);
    var answeredSources = new Set(existingReponses.map(function(r) { return r.question_source; }));
    // Trouver la première question sans réponse
    var startIdx = sessionQuestions.length;
    for (var i = 0; i < sessionQuestions.length; i++) {
      if (!answeredSources.has(sessionQuestions[i]._source)) { startIdx = i; break; }
    }
    var reponses = existingReponses.map(function(r) {
      return { question_source: r.question_source, reponse_choisie: r.reponse_choisie, correct: r.correct, temps_ms: r.temps_ms };
    });
    qcmState = { sessionId: session.id, item: item, mode: currentMode, questions: sessionQuestions, idx: startIdx, reponses: reponses, tStart: Date.now() };
    document.getElementById('qcm-flag').style.display = '';
    document.getElementById('qcm-thumbdown').style.display = '';
    document.getElementById('qcm-next').style.display = '';
    showQuestion();
    document.getElementById('qcm-modal').classList.remove('hidden');
  } catch(e) {
    alert('Erreur reprise : ' + e.message);
  }
}

document.getElementById('qcm-close').addEventListener('click', function() {
  document.getElementById('qcm-modal').classList.add('hidden');
  if (qcmState) { loadInProgress(); } // rafraîchir la bannière "en cours"
  qcmState = null;
});

document.getElementById('qcm-next').addEventListener('click', function() {
  if (!qcmState) return;
  if (qcmState.idx + 1 >= qcmState.questions.length) {
    finishSession();
  } else {
    qcmState.idx++;
    qcmState.tStart = Date.now();
    showQuestion();
  }
});

document.getElementById('qcm-flag').addEventListener('click', async function() {
  if (!qcmState || _previewTuteur) return;
  var q = qcmState.questions[qcmState.idx];
  var msg = prompt('Ce que vous n\'avez pas compris (optionnel) :');
  if (msg === null) return;
  try {
    await QCMEngine.flagQuestion(QCMEngine._utils.questionSourceId(q.item, q.question_numero), 'demande_explication', msg.trim() || null);
    alert('Demande envoyée au tuteur ✓');
    loadFlags();
  } catch(e) { alert('Erreur : ' + e.message); }
});

document.getElementById('qcm-thumbdown').addEventListener('click', async function() {
  if (!qcmState) return;
  var q = qcmState.questions[qcmState.idx];
  if (!confirm('Signaler une erreur dans cette question ?')) return;
  try {
    await QCMEngine.flagQuestion(QCMEngine._utils.questionSourceId(q.item, q.question_numero), 'erreur_question', null);
    alert('Erreur signalée ✓');
    loadFlags();
  } catch(e) { alert('Erreur : ' + e.message); }
});

function showQuestion() {
  var q = qcmState.questions[qcmState.idx];
  document.getElementById('qcm-progress').textContent = 'Question ' + (qcmState.idx + 1) + ' / ' + qcmState.questions.length;
  document.getElementById('qcm-meta').textContent = q.item || '';
  var content = document.getElementById('qcm-content');
  clear(content);

  content.appendChild(el('p', { class: 'text-sm font-medium text-slate-800 leading-relaxed', text: cleanQ(q.question) }));

  var choices = el('div', { class: 'space-y-2' });
  q.reponses.forEach(function(r) {
    var letter = el('span', { class: 'qcm-letter rounded-full bg-slate-100 text-slate-700 flex items-center justify-center flex-shrink-0', text: r.lettre });
    var textNode = el('span', { class: 'flex-1', text: r.texte });
    var btn = el('button', {
      class: 'qcm-choice w-full text-left px-3 py-3 bg-white border-2 border-slate-200 rounded-xl text-sm hover:border-indigo-300 transition flex items-start gap-3',
      dataset: { letter: r.lettre, correct: String(r.correct) }
    }, [letter, textNode]);
    btn.addEventListener('click', function() { onAnswer(q, btn); });
    choices.appendChild(btn);
  });
  content.appendChild(choices);

  var fb = el('div', { class: 'hidden', id: 'qcm-feedback' });
  content.appendChild(fb);

  document.getElementById('qcm-next').disabled = true;
}

function onAnswer(q, btn) {
  if (btn.dataset.answered) return;
  var letter = btn.dataset.letter;
  var correct = btn.dataset.correct === 'true';
  var temps_ms = Date.now() - qcmState.tStart;
  var reponse = { question_source: QCMEngine._utils.questionSourceId(q.item, q.question_numero), reponse_choisie: letter, correct: correct, temps_ms: temps_ms };
  qcmState.reponses.push(reponse);
  // Sauvegarde immédiate (permet la reprise si interruption)
  if (qcmState.sessionId) QCMEngine.saveAnswer(qcmState.sessionId, reponse).catch(function(e) { console.warn('save answer:', e); });
  document.querySelectorAll('.qcm-choice').forEach(function(b) { b.dataset.answered = '1'; b.style.pointerEvents = 'none'; });

  if (qcmState.mode === 'entrainement') {
    document.querySelectorAll('.qcm-choice').forEach(function(b) {
      var isCorrect = b.dataset.correct === 'true';
      var lt = b.querySelector('.qcm-letter');
      if (isCorrect) {
        b.className = b.className.replace('border-slate-200', 'border-emerald-500 bg-emerald-50');
        if (lt) lt.className = 'qcm-letter rounded-full bg-emerald-500 text-white flex items-center justify-center flex-shrink-0';
      } else if (b === btn) {
        b.className = b.className.replace('border-slate-200', 'border-red-500 bg-red-50');
        if (lt) lt.className = 'qcm-letter rounded-full bg-red-500 text-white flex items-center justify-center flex-shrink-0';
      }
    });
    var fb = document.getElementById('qcm-feedback');
    fb.className = 'mt-3 p-3 rounded-xl text-sm ' + (correct ? 'bg-emerald-50 text-emerald-800' : 'bg-red-50 text-red-800');
    clear(fb);
    fb.appendChild(el('p', { class: 'font-bold mb-1', text: correct ? '✓ Bonne réponse' : '✗ Incorrect' }));
    fb.appendChild(el('p', { class: 'text-xs leading-relaxed', text: q.explication || '' }));
    fb.classList.remove('hidden');
  } else {
    btn.className = btn.className.replace('border-slate-200', 'border-indigo-500 bg-indigo-50');
  }
  document.getElementById('qcm-next').disabled = false;
  if (qcmState.idx + 1 >= qcmState.questions.length) {
    document.getElementById('qcm-next').textContent = 'Terminer';
  }
}

async function finishSession() {
  var score = qcmState.reponses.filter(function(r) { return r.correct; }).length;
  var total = qcmState.questions.length;
  var content = document.getElementById('qcm-content');
  clear(content);
  var wrap = el('div', { class: 'text-center py-8' }, [
    el('p', { class: 'text-xs text-slate-500 font-semibold mb-2', text: 'SCORE FINAL' }),
    el('p', { class: 'text-5xl font-extrabold text-indigo-600 mb-1', text: score + ' / ' + total }),
    el('p', { class: 'text-sm text-slate-500', text: Math.round(100 * score / total) + ' % de bonnes réponses' }),
    el('p', { class: 'text-xs text-slate-400 mt-4', id: 'save-status', text: 'Enregistrement…' })
  ]);
  content.appendChild(wrap);
  var nextBtn = document.getElementById('qcm-next');
  nextBtn.textContent = 'Fermer';
  nextBtn.onclick = function() {
    document.getElementById('qcm-modal').classList.add('hidden');
    qcmState = null;
    nextBtn.textContent = 'Suivant';
    nextBtn.onclick = null;
  };
  try {
    if (qcmState.sessionId) {
      await QCMEngine.completeSession(qcmState.sessionId, score);
    }
    document.getElementById('save-status').textContent = '✓ Session enregistrée';
    loadInProgress(); // plus de session en cours → vider la bannière
  } catch(e) {
    document.getElementById('save-status').textContent = '⚠ Échec enregistrement : ' + e.message;
  }
}

document.getElementById('btn-export-qcm').addEventListener('click', async function() {
  var btn = this;
  var statusEl = document.getElementById('export-status');
  btn.disabled = true;
  statusEl.textContent = 'Chargement du catalogue…';
  statusEl.classList.remove('hidden');

  try {
    var sessions = await QCMEngine.getMyStats();
    var nom = document.getElementById('hdr-nom').textContent || 'Externe';
    var dateExport = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });

    statusEl.textContent = 'Chargement des 477 questions…';
    var idx = await QCMEngine.loadIndex();
    var allItems = {};
    await Promise.all(idx.items.map(async function(it) {
      try { allItems[it.item] = await QCMEngine.loadItem(it.item); } catch(e) {}
    }));

    var statsByItem = {};
    sessions.forEach(function(s) {
      var key = s.item || 'Tous items';
      if (!statsByItem[key]) statsByItem[key] = { n: 0, total: 0 };
      statsByItem[key].n++;
      statsByItem[key].total += s.nb_questions ? Math.round(100 * s.score / s.nb_questions) : 0;
    });

    statusEl.textContent = 'Génération du fichier…';
    var html = buildExportHTML(nom, dateExport, sessions, statsByItem, allItems, idx);
    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'QCM-EDN-' + nom.replace(/\s+/g, '-') + '-' + new Date().toISOString().slice(0, 10) + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    statusEl.textContent = '✓ Fichier téléchargé';
  } catch(e) {
    statusEl.textContent = '⚠ Erreur : ' + e.message;
  }
  btn.disabled = false;
});

    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    var item = e[0], s = e[1];

    return '<tr><td style="padding:6px 12px;font-weight:600">' + esc(item) + '</td>' +
      '<td style="padding:6px 12px;text-align:center">' + s.n + '</td>' +
